<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraSync — Enterprise Orchestration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060608;
    --deep: #0d0d12;
    --surface: #131318;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold-light: #e2c475;
    --gold-dim: rgba(201,168,76,0.15);
    --white: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --faint: rgba(240,237,232,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, width 0.2s, height 0.2s, opacity 0.2s;
  }
  body:hover .cursor { opacity: 1; }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9997;
    opacity: 0.4;
  }

  /* NAVIGATION */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(6,6,8,0.85);
    backdrop-filter: blur(20px);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }

  .nav-cta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--gold);
    border: none;
    padding: 10px 24px;
    cursor: none;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 48px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .hero-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    top: 10%; right: -100px;
    pointer-events: none;
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.6; }
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: var(--gold);
  }

  .hero-headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(56px, 8vw, 112px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    max-width: 900px;
    opacity: 0;
    animation: fadeUp 0.9s 0.4s forwards;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    max-width: 480px;
    color: var(--muted);
    line-height: 1.8;
    margin-top: 40px;
    font-size: 13px;
    opacity: 0;
    animation: fadeUp 0.9s 0.6s forwards;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-top: 52px;
    opacity: 0;
    animation: fadeUp 0.9s 0.8s forwards;
  }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--gold);
    border: none;
    padding: 16px 40px;
    cursor: none;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

  .btn-ghost {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    padding: 15px 40px;
    cursor: none;
    transition: color 0.2s, border-color 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }

  .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    max-width: 560px;
    margin-top: 96px;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.9s 1.0s forwards;
  }
  .stat {
    padding: 28px 32px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MARQUEE */
  .marquee-wrap {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    overflow: hidden;
    background: var(--deep);
  }
  .marquee-track {
    display: flex;
    gap: 64px;
    animation: marquee 20s linear infinite;
    white-space: nowrap;
  }
  .marquee-item {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }
  .marquee-item::before {
    content: '◆';
    color: var(--gold);
    font-size: 8px;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTION GLOBALS */
  section { padding: 120px 48px; position: relative; }
  
  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 60px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 32px; height: 1px;
    background: var(--gold);
  }

  .section-heading {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(40px, 5vw, 72px);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .section-heading em { font-style: italic; color: var(--gold); }

  /* PROOF SECTION */
  .proof { background: var(--deep); }

  .proof-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    margin-top: 72px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .proof-card {
    background: var(--deep);
    padding: 48px;
    position: relative;
    transition: background 0.3s;
  }
  .proof-card:hover { background: var(--surface); }

  .proof-metric {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }
  .proof-metric-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .proof-company {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .proof-industry {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }
  .proof-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.6;
    color: rgba(240,237,232,0.7);
    border-left: 2px solid var(--gold);
    padding-left: 20px;
  }
  .proof-author {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
  }
  .proof-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
  }
  .proof-author-info .name {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  .proof-author-info .role {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* FEATURES */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 120px 80px;
    margin-top: 80px;
  }

  .feature-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: var(--faint);
    line-height: 1;
    margin-bottom: -16px;
  }
  .feature-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-bottom: 16px;
    margin-top: 8px;
  }
  .feature-body {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
    margin-bottom: 32px;
  }

  /* LIVE PIPELINE VIZ */
  .pipeline-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-top: 20px;
  }
  .pipeline-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .pipeline-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .pipeline-name {
    font-size: 11px;
    letter-spacing: 0.05em;
    min-width: 160px;
    color: var(--white);
  }
  .pipeline-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--faint);
    position: relative;
    overflow: hidden;
  }
  .pipeline-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    animation: barLoad 2s ease-out forwards;
    transform-origin: left;
    transform: scaleX(0);
  }
  @keyframes barLoad {
    to { transform: scaleX(1); }
  }
  .pipeline-pct {
    font-size: 11px;
    color: var(--gold);
    min-width: 40px;
    text-align: right;
  }

  /* METRICS GRID */
  .metrics-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .metric-cell {
    background: var(--surface);
    padding: 24px;
  }
  .metric-cell .val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
  }
  .metric-cell .lbl {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* FLOW VIZ */
  .flow-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }
  .flow-node {
    padding: 10px 20px;
    border: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white);
  }
  .flow-node.active {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-dim);
  }
  .flow-arrow {
    color: var(--gold);
    font-size: 16px;
    animation: arrowPulse 1.5s ease-in-out infinite;
  }
  @keyframes arrowPulse {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50% { opacity: 1; transform: translateX(4px); }
  }

  /* CALCULATOR */
  .calc-section { background: var(--deep); }
  .calc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    margin-top: 72px;
    align-items: start;
  }
  .calc-inputs { display: flex; flex-direction: column; gap: 32px; }
  .input-group {}
  .input-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }
  .range-wrap {
    position: relative;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 1px;
    background: var(--border);
    outline: none;
    cursor: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    cursor: none;
  }
  .range-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
    margin-top: 8px;
  }

  .calc-output {
    border: 1px solid var(--border);
    padding: 48px;
    background: var(--surface);
  }
  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .calc-row:last-child { border-bottom: none; }
  .calc-row-label {
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .calc-row-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
  }
  .calc-row-val.highlight { color: var(--gold); }
  .calc-row-val.negative { color: #e05858; }

  /* INTEL / BLOG */
  .intel-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-top: 72px;
  }
  .intel-card {
    background: var(--deep);
    padding: 40px;
    transition: background 0.2s;
    cursor: none;
  }
  .intel-card:hover { background: var(--surface); }
  .intel-tag {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .intel-tag::before { content: '—'; }
  .intel-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .intel-card.featured .intel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
  }
  .intel-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .intel-read {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: gap 0.2s;
  }
  .intel-card:hover .intel-read { gap: 14px; }
  .intel-read::after { content: '→'; }

  /* CTA */
  .cta-section {
    text-align: center;
    padding: 160px 48px;
    background: var(--black);
    position: relative;
    overflow: hidden;
  }
  .cta-glow {
    position: absolute;
    width: 800px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .cta-section .section-heading {
    font-size: clamp(48px, 6vw, 88px);
    max-width: 800px;
    margin: 0 auto 16px;
    position: relative;
  }
  .cta-sub {
    color: var(--muted);
    max-width: 400px;
    margin: 24px auto 48px;
    position: relative;
  }
  .email-form {
    display: flex;
    gap: 0;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .email-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 16px 24px;
    outline: none;
    transition: border-color 0.2s;
  }
  .email-input::placeholder { color: var(--muted); }
  .email-input:focus { border-color: var(--gold); }
  .email-submit {
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 16px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: none;
    transition: background 0.2s;
  }
  .email-submit:hover { background: var(--gold-light); }

  /* FOOTER */
  footer {
    padding: 60px 48px 40px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    gap: 60px;
  }
  .footer-brand {}
  .footer-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .footer-logo span { color: var(--gold); }
  .footer-tagline {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 220px;
  }
  .footer-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf76;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .footer-col h4 {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: var(--white);
  }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .footer-col a {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
